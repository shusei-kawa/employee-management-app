<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>従業員情報編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-success text-white"><h3 class="mb-0">従業員情報の編集</h3>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/update/{id}(id=${employee.id})}" th:object="${employee}" method="post">
                <!-- 2026/05/11 バリデーションチェックの為コメントアウト
                                <div class="mb-3">
                                    <label class="form-label fw-bold">氏名</label>
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">部署名</label>
                                    <input type="text" th:field="*{department}" class="form-control" required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">入社年</label>
                                    <input type="number" th:field="*{hireYear}" class="form-control" required>
                                </div>-->
                <div class="mb-3">
                    <label class="form-label fw-bold">氏名</label>
                    <input type="text" th:field="*{name}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">部署名</label>
                    <input type="text" th:field="*{department}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('department')}"
                         th:errors="*{department}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">入社年</label>
                    <input type="number" th:field="*{hireYear}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('hireYear')}"
                         th:errors="*{hireYear}"></div>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-success px-4">更新保存</button>
                    <a href="/" class="btn btn-outline-secondary">キャンセルして戻る</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
