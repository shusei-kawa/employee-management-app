<body class="p-4">
<h1 class="mb-4">従業員管理ポータル</h1>

<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0">CSV一括登録</h5>
    </div>
    <div class="card-body">
        <form action="/upload" method="post" enctype="multipart/form-data" class="d-flex align-items-center">
            <input type="file" name="csvFile" accept=".csv" required class="form-control w-50 me-2">
            <button type="submit" class="btn btn-primary">アップロード</button>
        </form>
    </div>
</div>

<div class="mb-4 d-flex align-items-center">
    <h5 class="me-3 mb-0">従業員検索</h5>
    <form action="/" method="get" class="d-flex align-items-center">
        <!--2026/05/19     データの取得メソッドの変更（昇順）　削除
                <input type="text" name="department" placeholder="部署名を入力" class="form-control me-2" style="width: 200px;">
        　　2026/05/19     データの取得メソッドの変更（昇順）　削除-->
        <!--2026/05/19     データの取得メソッドの変更（昇順）　追加　S-->
        <input type="text" name="keyword" placeholder="部署名を入力" th:value="${keyword}" class="form-control me-2" style="width: 200px;">
        <!--2026/05/19     データの取得メソッドの変更（昇順）　追加　S-->
        <button type="submit" class="btn btn-outline-secondary me-2">検索</button>
        <a href="/" class="btn btn-link text-decoration-none">クリア</a>
    </form>
</div>

<hr>

<h3 class="mt-4 mb-3">登録済みの従業員一覧</h3>

<table class="table table-striped table-hover table-bordered align-middle">
    <thead class="table-dark text-center">
    <tr>
        <th style="width: 150px;">ID</th>
        <th>氏名</th>
        <th>部署名</th>
        <th style="width: 150px;">入社年</th>
        <th style="width: 900px;">操作</th> </tr>
    </thead>
    <tbody>
    <tr th:each="emp : ${employees}">
        <td class="text-center" th:text="${emp.id}">1</td>
        <td th:text="${emp.name}">テスト太郎</td>
        <td th:text="${emp.department}">テスト部</td>
        <td class="text-center" th:text="${emp.hireYear}">2000</td>
        <td>
            <div class="d-flex justify-content-center align-items-center gap-2">
                <a th:href="@{/salary/{id}(id=${emp.id})}" class="btn btn-info btn-sm text-white">給与明細</a>
                <a th:href="@{/edit/{id}(id=${emp.id})}" class="btn btn-success btn-sm">編集</a>
                <form th:action="@{/delete/{id}(id=${emp.id})}" method="post" class="m-0 p-0">
                    <button type="submit" onclick="return confirm('本当に削除しますか？');" class="btn btn-danger btn-sm">
                        削除
                    </button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>
<!--2026/05/19     データの取得メソッドの変更（昇順）　追加　S-->
<div th:if="${pageInfo != null and pageInfo.totalPages > 1}" style="margin-top: 20px; text-align: center;">
    <ul style="display: inline-flex; list-style: none; padding-left: 0;">

        <li style="margin: 0 5px;">
            <a th:href="@{/(page=0)}" th:if="${!pageInfo.first}" style="text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; color: #007bff; border-radius: 4px;">&lt;&lt;</a>
            <span th:if="${pageInfo.first}" style="padding: 6px 12px; border: 1px solid #eee; color: #bbb; border-radius: 4px; cursor: not-allowed;">&lt;&lt;</span>
        </li>

        <li style="margin: 0 5px;">
            <a th:href="@{/(page=${pageInfo.number - 1})}" th:if="${!pageInfo.first}" style="text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; color: #007bff; border-radius: 4px;">&lt;</a>
            <span th:if="${pageInfo.first}" style="padding: 6px 12px; border: 1px solid #eee; color: #bbb; border-radius: 4px; cursor: not-allowed;">&lt;</span>
        </li>

        <li th:each="i : ${#numbers.sequence(0, pageInfo.totalPages - 1)}" style="margin: 0 5px;">
            <span th:if="${pageInfo.number == i}" th:text="${i + 1}" style="padding: 6px 12px; border: 1px solid #007bff; background-color: #007bff; color: white; font-weight: bold; border-radius: 4px;">1</span>
            <a th:href="@{/(page=${i})}" th:if="${pageInfo.number != i}" th:text="${i + 1}" style="text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; color: #333; border-radius: 4px;">2</a>
        </li>

        <li style="margin: 0 5px;">
            <a th:href="@{/(page=${pageInfo.number + 1})}" th:if="${!pageInfo.last}" style="text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; color: #007bff; border-radius: 4px;">&gt;</a>
            <span th:if="${pageInfo.last}" style="padding: 6px 12px; border: 1px solid #eee; color: #bbb; border-radius: 4px; cursor: not-allowed;">&gt;</span>
        </li>

        <li style="margin: 0 5px;">
            <a th:href="@{/(page=${pageInfo.totalPages - 1})}" th:if="${!pageInfo.last}" style="text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; color: #007bff; border-radius: 4px;">&gt;&gt;</a>
            <span th:if="${pageInfo.last}" style="padding: 6px 12px; border: 1px solid #eee; color: #bbb; border-radius: 4px; cursor: not-allowed;">&gt;&gt;</span>
        </li>

    </ul>
</div>
<!--2026/05/19     データの取得メソッドの変更（昇順）　追加　E-->
</body>
</html>
