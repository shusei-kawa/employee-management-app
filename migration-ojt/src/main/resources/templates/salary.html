<!-- 2026/06/02 給与計算実行機能追加-->
<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>給与計算・明細履歴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
<div class="container bg-white p-5 rounded shadow-sm" style="max-width: 950px;">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h1 class="h2 text-primary mb-0">給与計算・明細システム</h1>
        <a href="/" class="btn btn-outline-secondary">従業員一覧に戻る</a>
    </div>

    <div class="card mb-4 border-0 bg-light">
        <div class="card-body row text-center">
            <div class="col-md-3 border-end"><small class="text-muted d-block">従業員ID</small><strong class="fs-5" th:text="${employee.id}">1</strong></div>
            <div class="col-md-3 border-end"><small class="text-muted d-block">氏名</small><strong class="fs-5" th:text="${employee.name}">テスト太郎</strong></div>
            <div class="col-md-3 border-end"><small class="text-muted d-block">所属部署</small><strong class="fs-5" th:text="${employee.department}">開発部</strong></div>
            <div class="col-md-3"><small class="text-muted d-block">入社年</small><strong class="fs-5" th:text="${employee.hireYear} + ' 年'">2020 年</strong></div>
        </div>
    </div>

    <div class="card mb-5 border-primary">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">ユーザー操作：この従業員の給与を計算・確定する</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/salary/calculate/{id}(id=${employee.id})}" method="post" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label font-weight-bold">対象年月</label>
                    <input type="month" name="targetMonth" value="2026-05" required class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">欠勤日数 (日)</label>
                    <input type="number" name="absentDays" min="0" value="0" required class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">遅刻時間 (時間)</label>
                    <input type="number" name="lateHours" min="0" step="0.5" value="0.0" required class="form-control">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success w-100 fw-bold">給与計算を実行</button>
                </div>
            </form>
        </div>
    </div>

    <h3 class="h5 mb-3 text-secondary">支給実績一覧（過去の確定データ）</h3>

    <div th:if="${#lists.isEmpty(salaryList)}" class="alert alert-secondary text-center">
        確定済みの給与明細データはまだありません。上のフォームから計算を実行してください。
    </div>

    <table th:if="${!#lists.isEmpty(salaryList)}" class="table table-bordered align-middle shadow-sm">
        <thead class="table-dark text-center">
        <tr>
            <th>対象月</th>
            <th>基本給</th>
            <th>控除額</th>
            <th class="table-primary text-dark">差引支給額 (手取り)</th>
            <th>計算・確定日時</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="salary : ${salaryList}" class="text-center">
            <td class="fw-bold text-secondary" th:text="${salary.targetMonth}">2026-05</td>
            <td class="text-end text-success fw-bold" th:text="'¥' + ${#numbers.formatInteger(salary.baseSalary, 3, 'COMMA')}">¥350,000</td>
            <td class="text-end text-danger" th:text="'¥' + ${#numbers.formatInteger(salary.deductionAmount, 3, 'COMMA')}">¥12,000</td>
            <td class="text-end table-primary fw-bold text-primary fs-5" th:text="'¥' + ${#numbers.formatInteger(salary.totalAmount, 3, 'COMMA')}">¥338,000</td>
            <td class="text-muted small" th:text="${#temporals.format(salary.calculatedAt, 'yyyy/MM/dd HH:mm:ss')}">2026/05/27</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
